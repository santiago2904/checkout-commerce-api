name: Deploy to AWS ECS

on:
  push:
    branches:
      - main  # Deploy automático cuando haces push a main
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: checkout-commerce-prod
  ECS_CLUSTER: checkout-commerce-prod-cluster
  ECS_SERVICE: checkout-commerce-prod-service
  CONTAINER_NAME: checkout-commerce-app

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login a Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build, tag y push de la imagen Docker
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}  # Usa el commit SHA como tag
        run: |
          # Build imagen
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Push imagen
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Output para siguiente step
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 5. Descargar task definition actual
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition checkout-commerce-prod \
            --query taskDefinition > task-definition.json

      # 6. Actualizar task definition con nueva imagen
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # 7. Deploy nueva task definition a ECS
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # 8. Notificación de éxito
      - name: Deployment successful
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🚀 New image: ${{ steps.build-image.outputs.image }}"
